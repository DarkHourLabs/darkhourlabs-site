<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Option 3: The Hex Shield -->
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a"/>
  <!-- Outer hexagon -->
  <polygon points="100,25 168,55 168,115 100,145 32,115 32,55" fill="none" stroke="url(#g3)" stroke-width="2.5"/>
  <!-- Inner hexagon -->
  <polygon points="100,50 145,70 145,100 100,120 55,100 55,70" fill="none" stroke="url(#g3)" stroke-width="1.5" opacity="0.5"/>
  <!-- Circuit lines inside -->
  <line x1="100" y1="50" x2="100" y2="120" stroke="url(#g3)" stroke-width="1" opacity="0.4"/>
  <line x1="55" y1="70" x2="145" y2="70" stroke="url(#g3)" stroke-width="1" opacity="0.4"/>
  <line x1="55" y1="100" x2="145" y2="100" stroke="url(#g3)" stroke-width="1" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="100" cy="85" r="8" fill="url(#g3)" opacity="0.7"/>
  <circle cx="100" cy="85" r="4" fill="#0a0a0a"/>
  <!-- Node dots at intersections -->
  <circle cx="100" cy="50" r="2.5" fill="url(#g3)"/>
  <circle cx="100" cy="120" r="2.5" fill="url(#g3)"/>
  <circle cx="55" cy="70" r="2.5" fill="url(#g3)"/>
  <circle cx="145" cy="70" r="2.5" fill="url(#g3)"/>
  <circle cx="55" cy="100" r="2.5" fill="url(#g3)"/>
  <circle cx="145" cy="100" r="2.5" fill="url(#g3)"/>
  <text x="100" y="198" text-anchor="middle" fill="#555" font-family="-apple-system, sans-serif" font-size="8" letter-spacing="3">DARK HOUR LABS</text>
</svg>