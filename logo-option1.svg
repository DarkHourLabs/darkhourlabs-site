<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Option 1: The Hourglass -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#888888;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a"/>
  <!-- Hourglass top -->
  <path d="M60 30 L140 30 L100 90 Z" fill="none" stroke="url(#g1)" stroke-width="3"/>
  <!-- Hourglass bottom (half-filled = dark hour) -->
  <path d="M60 170 L140 170 L100 110 Z" fill="url(#g1)" stroke="url(#g1)" stroke-width="3"/>
  <!-- Center line -->
  <line x1="100" y1="90" x2="100" y2="110" stroke="url(#g1)" stroke-width="2" opacity="0.5"/>
  <!-- Side lines -->
  <line x1="60" y1="30" x2="60" y2="170" stroke="url(#g1)" stroke-width="1" opacity="0.2"/>
  <line x1="140" y1="30" x2="140" y2="170" stroke="url(#g1)" stroke-width="1" opacity="0.2"/>
  <!-- Text -->
  <text x="100" y="198" text-anchor="middle" fill="#555" font-family="-apple-system, sans-serif" font-size="8" letter-spacing="3">DARK HOUR LABS</text>
</svg>