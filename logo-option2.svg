<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Option 2: The Circuit Eye -->
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4a6cf7;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a"/>
  <!-- Eye outer shape -->
  <path d="M30 100 Q100 40 170 100 Q100 160 30 100 Z" fill="none" stroke="url(#g2)" stroke-width="3"/>
  <!-- Iris circle -->
  <circle cx="100" cy="100" r="25" fill="none" stroke="url(#g2)" stroke-width="2.5"/>
  <!-- Pupil -->
  <circle cx="100" cy="100" r="10" fill="url(#g2)"/>
  <!-- Circuit lines from eye -->
  <line x1="125" y1="92" x2="155" y2="75" stroke="#4a6cf7" stroke-width="1.5" opacity="0.6"/>
  <circle cx="158" cy="73" r="3" fill="none" stroke="#4a6cf7" stroke-width="1" opacity="0.6"/>
  <line x1="75" y1="108" x2="45" y2="125" stroke="#4a6cf7" stroke-width="1.5" opacity="0.6"/>
  <circle cx="42" cy="127" r="3" fill="none" stroke="#4a6cf7" stroke-width="1" opacity="0.6"/>
  <line x1="100" y1="75" x2="100" y2="55" stroke="#4a6cf7" stroke-width="1.5" opacity="0.6"/>
  <circle cx="100" cy="52" r="3" fill="none" stroke="#4a6cf7" stroke-width="1" opacity="0.6"/>
  <text x="100" y="198" text-anchor="middle" fill="#555" font-family="-apple-system, sans-serif" font-size="8" letter-spacing="3">DARK HOUR LABS</text>
</svg>